<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Mensal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#ececec;
    font-family:"Segoe UI", Arial;
    padding:20px;
    color:#1e1f21;
}

.header{
    background:#721552;
    color:#ececec;
    padding:14px;
    border-radius:10px;
    text-align:center;
    font-size:24px;
    font-weight:700;
    margin-bottom:10px;
}

.back{
    margin-bottom:10px;
    display:inline-block;
    text-decoration:none;
    background:#1e1f21;
    color:#ececec;
    padding:6px 10px;
    border-radius:6px;
    font-size:12px;
}

.kpis{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:10px;
}

.kpi{
    padding:8px 14px;
    border:1px solid #a678c1;
    border-radius:8px;
    text-align:center;
}

.kpi p{
    font-size:22px;
    font-weight:700;
    margin:0;
}

.controls{
    display:flex;
    justify-content:center;
    margin-bottom:10px;
}

.controls input{
    width:300px;
    padding:8px;
    border-radius:6px;
    border:1px solid #a678c1;
}

.table-box{
    background:#fff;
    padding:10px;
    border-radius:10px;
    overflow-x:auto;
}

/* TABELA */
th, td{
    text-align:center !important;
    font-size:12px;
    vertical-align:middle;
}

/* ✔ DATA e PRAZO IGUAIS */
th:nth-child(1),
td:nth-child(1),
th:nth-child(7),
td:nth-child(7){
    width:120px;
}

/* ✔ SEQUÊNCIA MENOR (CORRETO AGORA) */
th:nth-child(2),
td:nth-child(2){
    width:70px;
}

/* INPUT CENTRALIZADO */
td input{
    width:100%;
    text-align:center;
}

/* STATUS */
.status-ok{
    color:#2ecc71;
    cursor:pointer;
    font-size:18px;
}

.status-x{
    color:#d3625d;
    cursor:pointer;
    font-size:18px;
}

/* OBS */
.obs-fixed{
    width:100%;
    height:31px;
    resize:none;
}

/* BOTÃO DELETE */
.btn-delete{
    transition:0.2s;
}

.btn-delete:hover{
    transform:scale(1.05);
}

.area-botoes{
    background:transparent;
    padding:15px;
    text-align:center;
    margin-top:10px;
}
</style>
</head>

<body>

<a class="back" href="index.html">← Voltar</a>

<div class="header" id="titulo"></div>

<div class="kpis">
<div class="kpi"><p id="total">0</p><small>Total</small></div>
<div class="kpi"><p id="ok">0</p><small>Concluídos</small></div>
<div class="kpi"><p id="x">0</p><small>Pendentes</small></div>
</div>

<div class="controls">
<input type="text" id="busca" placeholder="🔍 Buscar..." oninput="filtrarTabela()">
</div>

<div class="table-box">

<table class="table table-bordered" id="tabela">
<thead>
<tr>
<th>DATA</th>
<th>SEQUÊNCIA</th>
<th>INTERNADO | EXTERNO</th>
<th>TIPO</th>
<th>IMPRESSÃO</th>
<th>STATUS PLANILHA</th>
<th>PRAZO</th>
<th>REVISÃO PLANILHA</th>
<th>OBSERVAÇÕES</th>
<th>FECHADO TASY</th>
<th>AÇÕES</th>
</tr>
</thead>

<tbody></tbody>
</table>

</div>

<div class="area-botoes">
<button class="btn btn-primary" onclick="adicionarLinha()">+ Adicionar Linha</button>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const MES_ATUAL = params.get("mes") || "geral";
const STORAGE_KEY = "controle_" + MES_ATUAL;

document.getElementById("titulo").innerText = MES_ATUAL.toUpperCase();

/* DELETE ROBUSTO */
document.addEventListener("click",(e)=>{

    const btn = e.target.closest(".btn-delete");

    if(btn){
        const tr = btn.closest("tr");
        if(!tr) return;

        const confirmar = confirm("Tem certeza que deseja excluir esta linha?");
        if(!confirmar) return;

        tr.remove();
        salvarDados();
        atualizarKPIs();
        return;
    }

    if(e.target.classList.contains("status-ok")){
        e.target.classList.remove("status-ok");
        e.target.classList.add("status-x");
        e.target.innerHTML="❌";
        atualizarKPIs();
    }

    else if(e.target.classList.contains("status-x")){
        e.target.classList.remove("status-x");
        e.target.classList.add("status-ok");
        e.target.innerHTML="✅";
        atualizarKPIs();
    }

});

/* ADD LINHA */
function adicionarLinha(){

const tr = document.createElement("tr");

tr.innerHTML = `
<td><input class="form-control form-control-sm"></td>
<td><input class="form-control form-control-sm"></td>

<td>
<select class="form-select form-select-sm">
<option>INTERNADO</option>
<option>EXTERNO</option>
</select>
</td>

<td>
<select class="form-select form-select-sm">
<option>TÉCNICA</option>
<option>MÉDICA</option>
</select>
</td>

<td class="status-x">❌</td>
<td class="status-x">❌</td>

<td><input class="form-control form-control-sm"></td>

<td class="status-x">❌</td>

<td><textarea class="form-control form-control-sm obs-fixed"></textarea></td>

<td class="status-x">❌</td>

<td>
<button class="btn btn-danger btn-sm btn-delete" type="button">🗑</button>
</td>
`;

document.querySelector("tbody").appendChild(tr);

salvarDados();
atualizarKPIs();
}

/* FILTRO */
function filtrarTabela(){
    const termo = document.getElementById("busca").value.toLowerCase();

    document.querySelectorAll("tbody tr").forEach(tr=>{
        tr.style.display = tr.innerText.toLowerCase().includes(termo) ? "" : "none";
    });
}

/* SALVAR */
function salvarDados(){
    const dados = [];
    document.querySelectorAll("tbody tr").forEach(tr=>{
        dados.push(tr.outerHTML);
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(dados));
}

/* CARREGAR */
function carregarDados(){
    const dados = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

    dados.forEach(html=>{
        document.querySelector("tbody").insertAdjacentHTML("beforeend", html);
    });

    atualizarKPIs();
}

/* KPIs */
function atualizarKPIs(){

    const linhas = document.querySelectorAll("tbody tr");

    let total = 0;
    let ok = 0;
    let pend = 0;

    linhas.forEach(tr=>{
        const cell = tr.querySelector("td:nth-child(6)");
        if(!cell) return;

        total++;

        if(cell.classList.contains("status-ok")){
            ok++;
        } else {
            pend++;
        }
    });

    document.getElementById("total").innerText = total;
    document.getElementById("ok").innerText = ok;
    document.getElementById("x").innerText = pend;
}

document.addEventListener("input", salvarDados);
document.addEventListener("change", salvarDados);

carregarDados();

</script>

</body>
</html>
