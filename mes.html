<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Mensal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#ececec;
    font-family:"Segoe UI", Arial;
    padding:20px;
    color:#1e1f21;
}

.header{
    background:#721552;
    color:#ececec;
    padding:14px;
    border-radius:10px;
    text-align:center;
    font-size:24px;
    font-weight:700;
    margin-bottom:10px;
}

.back{
    margin-bottom:10px;
    display:inline-block;
    text-decoration:none;
    background:#1e1f21;
    color:#ececec;
    padding:6px 10px;
    border-radius:6px;
    font-size:12px;
}

.kpis{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:10px;
}

.kpi{
    padding:8px 14px;
    border:1px solid #a678c1;
    border-radius:8px;
    text-align:center;
}

.kpi p{
    font-size:22px;
    font-weight:700;
    margin:0;
}

.controls{
    display:flex;
    justify-content:center;
    margin-bottom:10px;
}

.controls input{
    width:300px;
    padding:8px;
    border-radius:6px;
    border:1px solid #a678c1;
}

.table-box{
    background:#fff;
    padding:10px;
    border-radius:10px;
    overflow-x:auto;
}

/* tabela centralizada */
th, td{
    text-align:center !important;
    font-size:12px;
    padding:6px;
    vertical-align:middle;
}

thead th{
    background:#1e1f21;
    color:#fff;
    cursor:pointer;
}

thead input, thead select{
    width:100%;
    margin-top:4px;
    font-size:11px;
}

.status-ok{
    color:#2ecc71;
    cursor:pointer;
    font-size:18px;
}

.status-x{
    color:#d3625d;
    cursor:pointer;
    font-size:18px;
}

.obs-fixed{
    width:100%;
    height:50px;
    resize:none;
}

.area-botoes{
    background:transparent;
    padding:15px;
    text-align:center;
    margin-top:10px;
}
</style>
</head>

<body>

<a class="back" href="index.html">← Voltar</a>

<div class="header" id="titulo"></div>

<div class="kpis">
<div class="kpi"><p id="total">0</p><small>Total</small></div>
<div class="kpi"><p id="ok">0</p><small>Concluídos</small></div>
<div class="kpi"><p id="x">0</p><small>Pendentes</small></div>
</div>

<div class="table-box">

<table class="table table-bordered" id="tabela">

<thead>
<tr>
<th onclick="sortTable(0)">DATA<br><input class="filtro" data-col="0"></th>
<th onclick="sortTable(1)">SEQ<br><input class="filtro" data-col="1"></th>
<th onclick="sortTable(2)">INTERNO/EXTERNO<br>
<select class="filtro" data-col="2">
<option value="">Todos</option>
<option>INTERNADO</option>
<option>EXTERNO</option>
</select>
</th>
<th onclick="sortTable(3)">TIPO<br>
<select class="filtro" data-col="3">
<option value="">Todos</option>
<option>TÉCNICA</option>
<option>MÉDICA</option>
</select>
</th>
<th>IMPRESSÃO</th>
<th onclick="sortTable(5)">STATUS PLANILHA<br>
<select class="filtro" data-col="5">
<option value="">Todos</option>
<option>OK</option>
<option>PENDENTE</option>
</select>
</th>
<th>PRAZO</th>
<th>REVISÃO</th>
<th>OBS</th>
<th>FECHADO</th>
<th>AÇÕES</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<div class="area-botoes">
<button class="btn btn-primary" onclick="adicionarLinha()">+ Adicionar Linha</button>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const MES_ATUAL = params.get("mes") || "geral";
const STORAGE_KEY = "controle_" + MES_ATUAL;

document.getElementById("titulo").innerText = MES_ATUAL.toUpperCase();

/* ================= FILTRO ================= */
document.querySelectorAll(".filtro").forEach(el=>{
    el.addEventListener("input", filtrar);
    el.addEventListener("change", filtrar);
});

function filtrar(){
    const rows = document.querySelectorAll("tbody tr");
    const filtros = document.querySelectorAll(".filtro");

    rows.forEach(row=>{
        let show = true;

        filtros.forEach(f=>{
            const col = f.dataset.col;
            const val = f.value.toLowerCase();

            if(!val) return;

            const cell = row.children[col];
            if(!cell) return;

            if(!cell.innerText.toLowerCase().includes(val)){
                show = false;
            }
        });

        row.style.display = show ? "" : "none";
    });
}

/* ================= SORT ================= */
function sortTable(col){
    const tbody = document.querySelector("tbody");
    const rows = Array.from(tbody.querySelectorAll("tr"));

    const asc = tbody.dataset.sort !== "asc";
    tbody.dataset.sort = asc ? "asc" : "desc";

    rows.sort((a,b)=>{
        const A = a.children[col].innerText;
        const B = b.children[col].innerText;

        return asc ? A.localeCompare(B) : B.localeCompare(A);
    });

    rows.forEach(r=>tbody.appendChild(r));
}

/* ================= ADD ROW ================= */
function adicionarLinha(){

const tr = document.createElement("tr");

tr.innerHTML = `
<td contenteditable></td>
<td contenteditable></td>

<td>
<select>
<option>INTERNADO</option>
<option>EXTERNO</option>
</select>
</td>

<td>
<select>
<option>TÉCNICA</option>
<option>MÉDICA</option>
</select>
</td>

<td class="status-x">❌</td>

<td class="status-x">❌</td>

<td><input></td>

<td class="status-x">❌</td>

<td><textarea class="obs-fixed"></textarea></td>

<td class="status-x">❌</td>

<td><button class="btn btn-danger btn-sm">🗑</button></td>
`;

document.querySelector("tbody").appendChild(tr);
salvar();
}

/* ================= STATUS CLICK ================= */
document.addEventListener("click",(e)=>{

    if(e.target.classList.contains("status-x")){
        e.target.classList.remove("status-x");
        e.target.classList.add("status-ok");
        e.target.innerText="✅";
    }

    else if(e.target.classList.contains("status-ok")){
        e.target.classList.remove("status-ok");
        e.target.classList.add("status-x");
        e.target.innerText="❌";
    }

    if(e.target.tagName==="BUTTON"){
        e.target.closest("tr").remove();
        salvar();
    }
});

/* ================= SAVE ================= */
function salvar(){
    const data = [];
    document.querySelectorAll("tbody tr").forEach(tr=>{
        data.push(tr.outerHTML);
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

/* ================= LOAD ================= */
function carregar(){
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
    data.forEach(html=>{
        document.querySelector("tbody").insertAdjacentHTML("beforeend", html);
    });
}

carregar();

</script>

</body>
</html>
