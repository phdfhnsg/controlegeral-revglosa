<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Mensal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#ececec;
    font-family:"Segoe UI", Arial;
    padding:20px;
    color:#1e1f21;
}

/* HEADER */
.header{
    background:#721552;
    color:#ececec;
    padding:14px;
    border-radius:10px;
    text-align:center;
    font-size:24px;
    font-weight:700;
    margin-bottom:10px;
}

/* VOLTAR */
.back{
    margin-bottom:10px;
    display:inline-block;
    text-decoration:none;
    background:#1e1f21;
    color:#ececec;
    padding:6px 10px;
    border-radius:6px;
    font-size:12px;
}

/* KPIs */
.kpis{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:10px;
    margin-bottom:10px;
}

.kpi{
    background:#ececec;
    padding:10px;
    border-radius:8px;
    text-align:center;
    border:1px solid #a678c1;
}

/* CONTROLES */
.controls{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.controls input{
    flex:1;
    padding:8px;
    border-radius:6px;
    border:1px solid #a678c1;
    font-size:13px;
}

/* CAIXA ROXA */
.table-box{
    background:#721552;
    padding:10px;
    border-radius:10px;
    border:1px solid #a678c1;
}

/* TABELA */
.table{
    background:#ffffff;
}

th, td{
    text-align:center !important;
    vertical-align:middle !important;
    font-size:13px;
    padding:6px !important;
    white-space:nowrap;
}

thead th{
    background:#1e1f21 !important;
    color:#ececec !important;
}

/* COLUNAS */
th:nth-child(1), td:nth-child(1){ width:90px; }
th:nth-child(2), td:nth-child(2){ width:80px; }
th:nth-child(3), td:nth-child(3){ width:120px; }
th:nth-child(4), td:nth-child(4){ width:140px; }
th:nth-child(5), td:nth-child(5){ width:80px; }
th:nth-child(6), td:nth-child(6){ width:110px; }

th:nth-child(7), td:nth-child(7){
    width:50%;
    min-width:400px;
    white-space:normal;
    text-align:left;
}

th:nth-child(8), td:nth-child(8){ width:70px; }

/* BOTÃO */
.btn-linha-box{
    margin-top:10px;
    padding:10px;
    text-align:center;
}

/* STATUS */
.status-ok{ color:#a678c1; }
.status-x{ color:#d3625d; }

.prazo-alerta{
    color:#d3625d !important;
    font-weight:bold;
}
</style>
</head>

<body>

<a class="back" href="index.html">← Voltar</a>

<div class="header" id="titulo"></div>

<div class="kpis">
<div class="kpi"><p id="total">0</p><small>Total</small></div>
<div class="kpi"><p id="ok">0</p><small>Concluídos</small></div>
<div class="kpi"><p id="x">0</p><small>Pendentes</small></div>
</div>

<div class="controls">
<input type="text" id="busca" placeholder="🔍 Buscar..." oninput="filtrarTabela()">
<button class="btn btn-success btn-sm" onclick="exportarCSV()">💾 Exportar Excel</button>
</div>

<div class="table-box">

<table class="table table-bordered" id="tabela">
<thead>
<tr>
<th>DATA</th>
<th>SEQ</th>
<th>TIPO</th>
<th>ÁREA (TÉCNICA / MÉDICA)</th>
<th>STATUS</th>
<th>PRAZO</th>
<th>OBSERVAÇÕES</th>
<th>AÇÕES</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="btn-linha-box">
<button class="btn btn-primary px-4 py-2" onclick="adicionarLinha()">+ Linha</button>
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const MES_ATUAL = params.get("mes") || "geral";

document.getElementById("titulo").innerText = MES_ATUAL.toUpperCase();

const STORAGE_KEY = "controle_" + MES_ATUAL;

/* BUSCA */
function filtrarTabela(){
    const termo=document.getElementById("busca").value.toLowerCase();
    document.querySelectorAll("#tabela tbody tr").forEach(tr=>{
        tr.style.display = tr.innerText.toLowerCase().includes(termo) ? "" : "none";
    });
}

/* EXPORT */
function exportarCSV(){
    let csv="DATA,SEQ,TIPO,ÁREA,STATUS,PRAZO,OBSERVAÇÕES\n";

    document.querySelectorAll("#tabela tbody tr").forEach(tr=>{
        const c=tr.querySelectorAll("td");

        let linha=[
            c[0].innerText,
            c[1].innerText,
            c[2].querySelector("select")?.value||"",
            c[3].querySelector("select")?.value||"",
            c[4].innerText,
            c[5].querySelector("input")?.value||"",
            c[6].innerText
        ];

        csv+=linha.map(v=>`"${v}"`).join(",")+"\n";
    });

    const blob=new Blob([csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob);

    const a=document.createElement("a");
    a.href=url;
    a.download="controle_"+MES_ATUAL+".csv";
    a.click();
}

/* KPIs */
function atualizarKPIs(){
    document.getElementById("total").innerText =
        document.querySelectorAll("tbody tr").length;

    document.getElementById("ok").innerText =
        document.querySelectorAll(".status-ok").length;

    document.getElementById("x").innerText =
        document.querySelectorAll(".status-x").length;
}

/* ADD LINHA */
function adicionarLinha(){
const tr = document.createElement("tr");

tr.innerHTML = `
<td contenteditable="true"></td>
<td contenteditable="true"></td>

<td>
<select class="form-select form-select-sm text-center">
<option>INTERNADO</option>
<option>EXTERNO</option>
</select>
</td>

<td>
<select class="form-select form-select-sm text-center">
<option>TÉCNICA</option>
<option>MÉDICA</option>
</select>
</td>

<td class="status-x">❌</td>

<td><input class="form-control form-control-sm text-center"></td>

<td contenteditable="true"></td>

<td><button class="btn btn-danger btn-sm btn-delete">🗑</button></td>
`;

document.querySelector("#tabela tbody").appendChild(tr);

atualizarKPIs();
}

/* STATUS + DELETE */
document.addEventListener("click",(e)=>{
    if(e.target.classList.contains("status-ok")){
        e.target.className="status-x";
        e.target.innerHTML="❌";
    } else if(e.target.classList.contains("status-x")){
        e.target.className="status-ok";
        e.target.innerHTML="✅";
    }

    if(e.target.classList.contains("btn-delete")){
        e.target.closest("tr").remove();
    }

    atualizarKPIs();
});

</script>

</body>
</html>
