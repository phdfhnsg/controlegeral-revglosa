<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Mensal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#ececec;
    font-family:"Segoe UI", Arial;
    padding:20px;
    color:#1e1f21;
}

.header{
    background:#721552;
    color:#ececec;
    padding:14px;
    border-radius:10px;
    text-align:center;
    font-size:24px;
    font-weight:700;
    margin-bottom:10px;
}

.kpis{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:10px;
}

.kpi{
    padding:8px 14px;
    border:1px solid #a678c1;
    border-radius:8px;
    text-align:center;
}

.kpi p{
    font-size:22px;
    font-weight:700;
    margin:0;
}

.controls{
    display:flex;
    justify-content:center;
    margin-bottom:10px;
}

.controls input{
    width:300px;
    padding:8px;
    border-radius:6px;
    border:1px solid #a678c1;
}

/* TABELA */
.table-box{
    background:#fff;
    padding:10px;
    border-radius:10px;
    overflow-x:auto;
}

th, td{
    text-align:center;
    font-size:12px;
    padding:6px;
}

thead th{
    background:#1e1f21;
    color:#ececec;
}

/* 🔥 AJUSTES DE TAMANHO */
th:nth-child(1), td:nth-child(1){ width:110px; } /* DATA */
th:nth-child(2), td:nth-child(2){ width:90px; }  /* SEQ */
th:nth-child(8), td:nth-child(8){ width:110px; } /* PRAZO */

/* STATUS */
.status-ok{ color:#a678c1; cursor:pointer; }
.status-x{ color:#d3625d; cursor:pointer; }

.area-botoes{
    background:#721552;
    padding:15px;
    border-radius:10px;
    text-align:center;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header" id="titulo"></div>

<div class="kpis">
<div class="kpi"><p id="total">0</p><small>Total</small></div>
<div class="kpi"><p id="ok">0</p><small>Concluídos</small></div>
<div class="kpi"><p id="x">0</p><small>Pendentes</small></div>
</div>

<div class="controls">
<input type="text" id="busca" placeholder="🔍 Buscar..." oninput="filtrarTabela()">
</div>

<div class="table-box">

<table class="table table-bordered" id="tabela">
<thead>
<tr>
<th>DATA</th>
<th>SEQ</th>
<th>INTERNADO | EXTERNO</th>
<th>TÉCNICA | MÉDICA</th>
<th>IMPRESSÃO</th>
<th>STATUS PLANILHA</th>
<th>PLANILHA</th>
<th>PRAZO</th>
<th>REVISÃO PLANILHA</th>
<th>OBSERVAÇÕES</th>
<th>FECHADO TASY</th>
<th>AÇÕES</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<div class="area-botoes">
<button class="btn btn-primary" onclick="adicionarLinha()">+ Adicionar Linha</button>
</div>

<script>

const STORAGE_KEY = "controle";

/* KPI AGORA SÓ STATUS PLANILHA */
function atualizarKPIs(){
    const linhas = document.querySelectorAll("tbody tr");

    document.getElementById("total").innerText = linhas.length;

    document.getElementById("ok").innerText =
        document.querySelectorAll("tbody tr td:nth-child(6).status-ok").length;

    document.getElementById("x").innerText =
        document.querySelectorAll("tbody tr td:nth-child(6).status-x").length;
}

/* ADD */
function adicionarLinha(){
const tr=`
<tr>
<td contenteditable="true"></td>
<td contenteditable="true"></td>

<td>
<select class="form-select form-select-sm">
<option>INTERNADO</option>
<option>EXTERNO</option>
</select>
</td>

<td>
<select class="form-select form-select-sm">
<option>TÉCNICA</option>
<option>MÉDICA</option>
</select>
</td>

<td contenteditable="true"></td>

<td class="status-x">❌</td>

<td contenteditable="true"></td>

<td><input class="form-control form-control-sm text-center" placeholder="dd/mm/aaaa"></td>

<td class="status-x">❌</td>

<td contenteditable="true"></td>

<td class="status-x">❌</td>

<td><button class="btn btn-danger btn-sm btn-delete">🗑</button></td>
</tr>
`;

document.querySelector("tbody").insertAdjacentHTML("beforeend",tr);

salvarDados();
atualizarKPIs();
}

/* CLICK */
document.addEventListener("click",(e)=>{

    if(e.target.classList.contains("status-ok")){
        e.target.className="status-x";
        e.target.innerHTML="❌";
    } else if(e.target.classList.contains("status-x")){
        e.target.className="status-ok";
        e.target.innerHTML="✅";
    }

    if(e.target.classList.contains("btn-delete")){
        if(confirm("Excluir linha?")){
            e.target.closest("tr").remove();
            salvarDados();
            atualizarKPIs();
        }
    }
});

/* BUSCA */
function filtrarTabela(){
    const termo=document.getElementById("busca").value.toLowerCase();
    document.querySelectorAll("tbody tr").forEach(tr=>{
        tr.style.display = tr.innerText.toLowerCase().includes(termo) ? "" : "none";
    });
}

/* SALVAR */
function salvarDados(){
    const dados=[];
    document.querySelectorAll("tbody tr").forEach(tr=>{
        dados.push(tr.innerHTML);
    });
    localStorage.setItem(STORAGE_KEY,JSON.stringify(dados));
}

/* CARREGAR */
function carregarDados(){
    const dados=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
    dados.forEach(d=>{
        document.querySelector("tbody").insertAdjacentHTML("beforeend",d);
    });
    atualizarKPIs();
}

document.addEventListener("input",salvarDados);
document.addEventListener("change",salvarDados);

carregarDados();

</script>

</body>
</html>
