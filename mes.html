<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Mensal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#ececec;
    font-family:"Segoe UI", Arial;
    padding:20px;
    color:#1e1f21;
}

.header{
    background:#721552;
    color:#ececec;
    padding:14px;
    border-radius:10px;
    text-align:center;
    font-size:24px;
    font-weight:700;
    margin-bottom:10px;
}

.back{
    margin-bottom:10px;
    display:inline-block;
    text-decoration:none;
    background:#1e1f21;
    color:#ececec;
    padding:6px 10px;
    border-radius:6px;
    font-size:12px;
}

/* 🔥 KPIs CENTRALIZADOS */
.kpis{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:10px;
}

.kpi{
    background:#ececec;
    padding:8px 14px; /* 🔥 menor altura */
    border-radius:8px;
    text-align:center;
    border:1px solid #a678c1;
    min-width:110px;
}

/* 🔥 NÚMEROS MAIORES */
.kpi p{
    margin:0;
    font-size:22px; /* 🔥 aumentado */
    font-weight:700;
}

/* 🔥 TEXTO MENOR */
.kpi small{
    font-size:11px;
}

/* BUSCA */
.controls{
    display:flex;
    justify-content:center;
    margin-bottom:10px;
}

.controls input{
    width:300px;
    padding:8px;
    border-radius:6px;
    border:1px solid #a678c1;
    font-size:13px;
}

/* TABELA */
.table-box{
    background:#ffffff;
    padding:10px;
    border-radius:10px;
    overflow-x:auto;
    border:1px solid #a678c1;
}

th, td{
    text-align:center !important;
    vertical-align:middle !important;
    font-size:13px;
    padding:6px !important;
    white-space:nowrap;
}

thead th{
    background:#1e1f21 !important;
    color:#ececec !important;
}

th:nth-child(7), td:nth-child(7){
    width:50%;
    min-width:400px;
    white-space:normal;
    text-align:left;
}

.status-ok{ color:#a678c1; }
.status-x{ color:#d3625d; }

/* BOTÃO */
.area-botoes{
    background:#721552;
    padding:15px;
    border-radius:10px;
    text-align:center;
    margin-top:10px;
}

.btn-add{
    font-size:16px;
    padding:8px 20px;
}
</style>
</head>

<body>

<a class="back" href="index.html">← Voltar</a>

<div class="header" id="titulo"></div>

<div class="kpis">
<div class="kpi"><p id="total">0</p><small>Total</small></div>
<div class="kpi"><p id="ok">0</p><small>Concluídos</small></div>
<div class="kpi"><p id="x">0</p><small>Pendentes</small></div>
</div>

<div class="controls">
<input type="text" id="busca" placeholder="🔍 Buscar..." oninput="filtrarTabela()">
</div>

<div class="table-box">

<table class="table table-bordered" id="tabela">
<thead>
<tr>
<th>DATA</th>
<th>SEQ</th>
<th>TIPO</th>
<th>ÁREA</th>
<th>STATUS</th>
<th>PRAZO</th>
<th>OBSERVAÇÕES</th>
<th>AÇÕES</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<div class="area-botoes">
    <button class="btn btn-primary btn-add" onclick="adicionarLinha()">+ Adicionar Linha</button>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const MES_ATUAL = params.get("mes") || "geral";

document.getElementById("titulo").innerText = MES_ATUAL.toUpperCase();

const STORAGE_KEY = "controle_" + MES_ATUAL;

/* BUSCA */
function filtrarTabela(){
    const termo=document.getElementById("busca").value.toLowerCase();
    document.querySelectorAll("#tabela tbody tr").forEach(tr=>{
        tr.style.display = tr.innerText.toLowerCase().includes(termo) ? "" : "none";
    });
}

/* KPIs */
function atualizarKPIs(){
    document.getElementById("total").innerText =
        document.querySelectorAll("tbody tr").length;

    document.getElementById("ok").innerText =
        document.querySelectorAll(".status-ok").length;

    document.getElementById("x").innerText =
        document.querySelectorAll(".status-x").length;
}

/* ADD LINHA */
function adicionarLinha(){
const tr=`
<tr>
<td contenteditable="true"></td>
<td contenteditable="true"></td>

<td>
<select class="form-select form-select-sm text-center">
<option>INTERNADO</option>
<option>EXTERNO</option>
</select>
</td>

<td>
<select class="form-select form-select-sm text-center">
<option>TÉCNICA</option>
<option>MÉDICA</option>
</select>
</td>

<td class="status-x">❌</td>

<td><input class="form-control form-control-sm text-center"></td>

<td contenteditable="true"></td>

<td><button class="btn btn-danger btn-sm btn-delete">🗑</button></td>
</tr>
`;

document.querySelector("tbody").insertAdjacentHTML("beforeend",tr);

salvarDados();
atualizarKPIs();
}

/* DELETE + STATUS */
document.addEventListener("click",(e)=>{

    if(e.target.classList.contains("status-ok")){
        e.target.className="status-x";
        e.target.innerHTML="❌";
    } else if(e.target.classList.contains("status-x")){
        e.target.className="status-ok";
        e.target.innerHTML="✅";
    }

    if(e.target.classList.contains("btn-delete")){
        if(confirm("Deseja realmente excluir esta linha?")){
            e.target.closest("tr").remove();
            salvarDados();
            atualizarKPIs();
        }
    }
});

/* SALVAR */
function salvarDados(){
    const dados=[];

    document.querySelectorAll("#tabela tbody tr").forEach(tr=>{
        dados.push({
            data:tr.children[0].innerText,
            seq:tr.children[1].innerText,
            tipo:tr.children[2].querySelector("select").value,
            area:tr.children[3].querySelector("select").value,
            status:tr.children[4].innerHTML,
            prazo:tr.children[5].querySelector("input").value,
            obs:tr.children[6].innerText
        });
    });

    localStorage.setItem(STORAGE_KEY,JSON.stringify(dados));
}

/* CARREGAR */
function carregarDados(){
    const dados=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");

    dados.forEach(d=>{
        adicionarLinha();
    });
}

document.addEventListener("input",salvarDados);
document.addEventListener("change",salvarDados);

carregarDados();

</script>

</body>
</html>
