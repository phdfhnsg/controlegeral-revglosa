<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Geral 2026</title>

<style>

body{
    margin:0;
    font-family:"Segoe UI", Arial, sans-serif;
    min-height:100vh;

    background:
    radial-gradient(circle at 15% 20%, rgba(13,110,253,0.25), transparent 40%),
    radial-gradient(circle at 85% 30%, rgba(32,201,151,0.18), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(13,110,253,0.15), transparent 50%),
    linear-gradient(180deg, #0b1220 0%, #0f1a2b 50%, #0a1020 100%);

    display:flex;
    justify-content:center;
    align-items:center;
}

/* CONTAINER */
.container{
    width:95%;
    max-width:1100px;
    text-align:center;
}

/* HEADER */
.header{
    color:#ffffff;
    font-size:28px;
    font-weight:800;
    letter-spacing:1px;
    margin-bottom:18px;
}

/* linha decorativa */
.header::after{
    content:"";
    display:block;
    width:120px;
    height:3px;
    margin:10px auto 0 auto;
    background:linear-gradient(90deg, #0d6efd, #20c997);
    border-radius:10px;
}

/* SUB CENTRALIZADO ENTRE TÍTULO E GRID */
.sub{
    color:rgba(255,255,255,0.70);
    font-size:14px;

    margin-top:25px;   /* espaço do título */
    margin-bottom:45px; /* espaço dos botões */

    display:flex;
    justify-content:center;
    align-items:center;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:18px;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.10);
    backdrop-filter: blur(10px);

    padding:18px;
    border-radius:14px;
    cursor:pointer;

    transition:0.25s;
    color:#fff;
    font-weight:600;

    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    position:relative;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-6px);
    border-color:rgba(13,110,253,0.4);
    box-shadow:0 15px 35px rgba(13,110,253,0.25);
}

.card::after{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
    transition:0.5s;
}

.card:hover::after{
    left:120%;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
CONTROLE GERAL 2026 - REVISÃO DE GLOSAS - HNSG
</div>

<div class="sub">
Selecione o mês para acessar o sistema
</div>

<div class="grid">

<div class="card" onclick="abrir('janeiro')">Janeiro</div>
<div class="card" onclick="abrir('fevereiro')">Fevereiro</div>
<div class="card" onclick="abrir('marco')">Março</div>
<div class="card" onclick="abrir('abril')">Abril</div>
<div class="card" onclick="abrir('maio')">Maio</div>
<div class="card" onclick="abrir('junho')">Junho</div>
<div class="card" onclick="abrir('julho')">Julho</div>
<div class="card" onclick="abrir('agosto')">Agosto</div>
<div class="card" onclick="abrir('setembro')">Setembro</div>
<div class="card" onclick="abrir('outubro')">Outubro</div>
<div class="card" onclick="abrir('novembro')">Novembro</div>
<div class="card" onclick="abrir('dezembro')">Dezembro</div>

</div>

</div>

<script>
function abrir(mes){
    window.location.href = "mes.html?mes=" + mes;
}
</script>

</body>
</html>
